<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Woi AI Collector</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="logo">🤖</div>
        <div>
          <div class="title">Woi AI Collector</div>
          <div class="sub">Right‑click highlighted text → send to AI</div>
        </div>
      </div>

      <div class="bar">
        <input id="filter" placeholder="Filter history..." />
        <button id="clear">Clear</button>
      </div>

      <div id="list" class="list"></div>

      <div class="footer">
        <span class="pill">Tier 0–2: shared (anon)</span>
        <span class="pill">Tier 3: opt‑in (in app)</span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
